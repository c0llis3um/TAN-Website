[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Daily overdue check — 10:00 UTC
[functions."check-overdue"]
  schedule = "0 10 * * *"

# SPA routing — all paths go to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
